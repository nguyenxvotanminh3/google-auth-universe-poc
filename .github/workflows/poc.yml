name: Victim PR Workflow

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  auth:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }} # unsafe checkout of fork PR ref

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/123456/locations/global/workloadIdentityPools/test-pool/providers/test-provider'
          service_account: 'test@test-project.iam.gserviceaccount.com'
          universe: ${{ github.event.pull_request.head.ref }} # Derived from fork branch name (attacker controlled)
